name: "Sci-Fi"
description: >
  Futuristic names with varied consonant-vowel structures, optional hyphens,
  and scientific/technical suffixes. Works for alien species, human colony
  designations, androids, and megacorp personnel. Avoids the samey X/Y-heavy
  clusters of the original by mixing short punchy prefixes with longer
  multi-syllable options.

prefixes:
  # Short / punchy
  - "Ax"
  - "Kyr"
  - "Zel"
  - "Vex"
  - "Nyx"
  - "Dax"
  - "Vel"
  - "Cen"
  - "Sol"
  - "Hex"
  - "Ran"
  - "Ora"
  - "Lyr"
  - "Mira"
  - "Thar"
  - "Rael"
  - "Synn"
  - "Kael"
  - "Vorn"
  - "Zeph"
  - "Drey"
  - "Fen"
  - "Kor"
  - "Hale"
  # Multi-syllable
  - "Auro"
  - "Nexo"
  - "Telos"
  - "Sigma"
  - "Arcen"
  - "Kelion"
  - "Procyon"
  - "Helia"
  - "Selene"
  - "Caspian"
  - "Erion"
  - "Voltan"

middles:
  - "-"
  - "ar"
  - "ix"
  - "ex"
  - "or"
  - "ur"
  - "on"
  - "an"
  - "yn"
  - "ax"
  - "al"
  - "el"
  - "ul"
  - "in"
  - "eon"
  - "ion"
  - "ara"
  - "ova"

suffixes:
  # Technical / lab
  - "ite"
  - "eon"
  - "ius"
  - "ara"
  - "ova"
  - "yne"
  - "oid"
  - "arc"
  - "ance"
  - "ix"
  - "ex"
  - "ax"
  - "ox"
  - "ux"
  - "on"
  - "yn"
  - "ar"
  - "or"
  - "ur"
  - "el"
  - "al"
  - "ul"
  # Greek-letter style
  - "alpha"
  - "delta"
  - "sigma"
  - "vega"
  - "lyra"

rules:
  no_hard_consonants: false
  max_consecutive_consonants: 2
  vowel_harmony: "none"
  allow_hyphen_separator: true
  compound_probability: 0.25
  short_probability: 0.20
  max_length: 12
  min_length: 3

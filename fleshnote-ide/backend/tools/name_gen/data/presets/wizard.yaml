rules:
  no_hard_consonants: false
  max_consecutive_consonants: 2
  vowel_harmony: "none"
  allow_special_vowels: true
  allow_special_consonants: true
  compound_probability: 0.25
  short_probability: 0.15
  max_length: 10
  min_length: 5

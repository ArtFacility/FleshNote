name: "Elvish"
description: >
  Flowing, vowel-heavy elven names with soft consonants and melodic diphthongs.
  Inspired by Tolkienesque and general high-fantasy elvish naming conventions.

prefixes:
  - "Aer"
  - "Ael"
  - "Fae"
  - "Gal"
  - "Syl"
  - "Thal"
  - "Cel"
  - "Ely"
  - "Mir"
  - "Lor"
  - "Cal"
  - "Ari"
  - "Ela"
  - "Ilo"
  - "Ame"
  - "Ere"
  - "Ith"
  - "Lúm"
  - "Nae"
  - "Ola"
  - "Sae"
  - "Tae"
  - "Vae"
  - "Wyn"
  - "Yre"
  - "Zae"

middles:
  - "ia"
  - "io"
  - "ae"
  - "ei"
  - "a"
  - "e"
  - "i"
  - "oa"
  - "li"
  - "la"
  - "le"
  - "lo"
  - "ni"
  - "na"
  - "ri"
  - "ra"
  - "si"
  - "sa"
  - "ti"
